<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>TAROT SHUFFLE 🔮</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{min-height:100vh;background:radial-gradient(ellipse at 50% 0%,#1a0533,#080110 70%);font-family:Georgia,serif;color:#e8d5b0;display:flex;flex-direction:column;align-items:center;padding:2rem 1rem;}
@keyframes tw{0%,100%{opacity:.15}50%{opacity:.8}}
@keyframes fl{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
@keyframes sh{0%{transform:rotate(-4deg) scale(1.03)}50%{transform:rotate(4deg) scale(.97)}100%{transform:rotate(-4deg) scale(1.03)}}
@keyframes gp{0%,100%{box-shadow:0 0 18px #9333ea55}50%{box-shadow:0 0 40px #c084fcaa,0 0 80px #9333ea44}}
@keyframes fi{0%{transform:rotateY(90deg);opacity:0}100%{transform:rotateY(0);opacity:1}}
@keyframes su{from{transform:translateY(16px);opacity:0}to{transform:translateY(0);opacity:1}}
.star{position:fixed;border-radius:50%;width:2px;height:2px;background:#fff;pointer-events:none;}
#wrap{position:relative;z-index:1;width:100%;max-width:440px;}
.title-icon{font-size:2.2rem;animation:fl 3.5s ease-in-out infinite;text-align:center;}
h1{text-align:center;margin:.4rem 0 .2rem;font-size:1.6rem;color:#e2c5ff;letter-spacing:.2em;}
#subtitle{text-align:center;font-size:.7rem;color:#9b72cf;letter-spacing:.15em;margin-bottom:1.8rem;}
#card-area{display:flex;flex-direction:column;align-items:center;gap:1.4rem;}
#card{width:160px;height:260px;border-radius:14px;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;overflow:hidden;transition:border-color .3s;}
#card .pattern{position:absolute;inset:0;background:repeating-linear-gradient(45deg,transparent,transparent 12px,rgba(168,85,247,.06) 12px,rgba(168,85,247,.06) 24px);}
#card-inner{text-align:center;padding:0 12px;}
#card-inner .csym{font-size:2.8rem;margin-bottom:.5rem;}
#card-inner .cko{font-size:.85rem;color:#1e1033;font-weight:bold;}
#card-inner .cen{font-size:.58rem;color:#44337a;margin-top:.2rem;}
#card-inner .cyn{margin-top:.6rem;font-size:.68rem;font-weight:bold;border-radius:20px;padding:.2rem .7rem;display:inline-block;}
.btn{cursor:pointer;border:none;border-radius:30px;font-family:Georgia,serif;font-size:.9rem;letter-spacing:.1em;padding:.75rem 2.8rem;transition:transform .15s;}
.btn:hover{transform:scale(1.05)}.btn:active{transform:scale(.97)}
#btn-start{background:linear-gradient(135deg,#7c3aed,#9333ea);border:1px solid #a855f7;color:#f3e8ff;animation:gp 2s ease-in-out infinite;}
#btn-stop{background:linear-gradient(135deg,#b91c1c,#ef4444);border:1px solid #f87171;color:#fff;box-shadow:0 0 20px #ef444466;}
#btn-confirm{background:linear-gradient(135deg,#065f46,#059669);border:1px solid #34d399;color:#ecfdf5;animation:su .3s ease-out;}
#status{font-size:.65rem;color:#7c3aed;}
#flipping-msg{font-size:.82rem;color:#c084fc;animation:fl 1s ease-in-out infinite;}
#drawn-area{margin-top:2rem;animation:su .5s ease-out;}
#drawn-title{text-align:center;font-size:.68rem;color:#7c3aed;letter-spacing:.15em;margin-bottom:1rem;}
#drawn-cards{display:flex;gap:.7rem;justify-content:center;flex-wrap:wrap;}
.drawn-card{width:115px;text-align:center;background:linear-gradient(160deg,#12022a,#1e1040);border:1px solid #5b21b6;border-radius:12px;padding:.9rem .5rem;animation:su .5s ease-out;}
.dc-label{font-size:.58rem;color:#7c3aed;margin-bottom:.4rem;}
.dc-sym{font-size:1.8rem;margin-bottom:.35rem;}
.dc-ko{font-size:.7rem;color:#e2c5ff;font-weight:bold;line-height:1.3;margin-bottom:.2rem;}
.dc-info{font-size:.54rem;color:#7c5ea3;margin-bottom:.45rem;}
.dc-yn{font-size:.62rem;font-weight:bold;border-radius:20px;padding:.18rem .5rem;display:inline-block;}
#done-box{margin-top:2rem;text-align:center;padding:1.6rem;border-radius:16px;background:#12022a99;border:1px solid #7c3aed;animation:su .6s ease-out;}
#btn-reset{cursor:pointer;padding:.55rem 1.6rem;background:transparent;border:1px solid #7c3aed;border-radius:20px;color:#c084fc;font-family:Georgia,serif;font-size:.75rem;letter-spacing:.1em;margin-top:1.2rem;transition:transform .15s;}
#btn-reset:hover{transform:scale(1.05)}
.hidden{display:none!important;}
</style>
</head>
<body>
<div id="stars"></div>
<div id="wrap">
  <div class="title-icon">🔮</div>
  <h1>TAROT SHUFFLE</h1>
  <p id="subtitle">✦ 첫 번째 카드 ✦</p>

  <div id="card-area">
    <div id="card" style="background:linear-gradient(160deg,#1b0840,#2d1b4e);border:2px solid #4c1d95;animation:fl 3s ease-in-out infinite;">
      <div class="pattern"></div>
      <div style="color:#3b1a6e;font-size:2rem;" id="idle-mark">✦</div>
      <div id="card-inner" class="hidden"></div>
    </div>
    <div id="status" class="hidden"></div>
    <button id="btn-start" class="btn">🃏 셔플 시작</button>
    <button id="btn-stop" class="btn hidden">✋ 지금 멈추기!</button>
    <button id="btn-confirm" class="btn hidden">✅ 이 카드로 확정</button>
    <div id="flipping-msg" class="hidden">카드를 뒤집는 중...</div>
  </div>

  <div id="drawn-area" class="hidden">
    <div id="drawn-title">✦ 뽑힌 카드 ✦</div>
    <div id="drawn-cards"></div>
  </div>

  <div id="done-box" class="hidden">
    <div style="font-size:1.6rem;margin-bottom:.5rem;">✨</div>
    <div style="font-size:.95rem;color:#e2c5ff;margin-bottom:.6rem;">3장을 모두 뽑았습니다!</div>
    <div id="done-list" style="font-size:.75rem;color:#9167c0;line-height:1.8;margin-bottom:.5rem;"></div>
    <div style="font-size:.72rem;color:#7c5ea3;">이 링크를 친구에게 공유해보세요 🔮</div>
    <button id="btn-reset">🔄 다시 뽑기</button>
  </div>
</div>

<script>
const deck=[
  {i:0,n:"The Fool",k:"바보",y:"yes"},{i:1,n:"The Magician",k:"마법사",y:"yes"},
  {i:2,n:"The High Priestess",k:"여사제",y:"other"},{i:3,n:"The Empress",k:"여황제",y:"yes"},
  {i:4,n:"The Emperor",k:"황제",y:"yes"},{i:5,n:"The Hierophant",k:"교황",y:"other"},
  {i:6,n:"The Lovers",k:"연인",y:"yes"},{i:7,n:"The Chariot",k:"전차",y:"yes"},
  {i:8,n:"Strength",k:"힘",y:"yes"},{i:9,n:"The Hermit",k:"은둔자",y:"other"},
  {i:10,n:"Wheel of Fortune",k:"운명의 수레바퀴",y:"yes"},{i:11,n:"Justice",k:"정의",y:"other"},
  {i:12,n:"The Hanged Man",k:"매달린 사람",y:"other"},{i:13,n:"Death",k:"죽음",y:"other"},
  {i:14,n:"Temperance",k:"절제",y:"yes"},{i:15,n:"The Devil",k:"악마",y:"no"},
  {i:16,n:"The Tower",k:"탑",y:"no"},{i:17,n:"The Star",k:"별",y:"yes"},
  {i:18,n:"The Moon",k:"달",y:"no"},{i:19,n:"The Sun",k:"태양",y:"yes"},
  {i:20,n:"Judgement",k:"심판",y:"yes"},{i:21,n:"The World",k:"세계",y:"yes"},
  {i:22,n:"Ace of Wands",k:"완드 에이스",y:"yes"},{i:23,n:"Two of Wands",k:"완드 2",y:"yes"},
  {i:24,n:"Three of Wands",k:"완드 3",y:"yes"},{i:25,n:"Four of Wands",k:"완드 4",y:"yes"},
  {i:26,n:"Five of Wands",k:"완드 5",y:"no"},{i:27,n:"Six of Wands",k:"완드 6",y:"yes"},
  {i:28,n:"Seven of Wands",k:"완드 7",y:"other"},{i:29,n:"Eight of Wands",k:"완드 8",y:"yes"},
  {i:30,n:"Nine of Wands",k:"완드 9",y:"other"},{i:31,n:"Ten of Wands",k:"완드 10",y:"no"},
  {i:32,n:"Page of Wands",k:"완드 시종",y:"yes"},{i:33,n:"Knight of Wands",k:"완드 기사",y:"yes"},
  {i:34,n:"Queen of Wands",k:"완드 여왕",y:"yes"},{i:35,n:"King of Wands",k:"완드 왕",y:"yes"},
  {i:36,n:"Ace of Cups",k:"컵 에이스",y:"yes"},{i:37,n:"Two of Cups",k:"컵 2",y:"yes"},
  {i:38,n:"Three of Cups",k:"컵 3",y:"yes"},{i:39,n:"Four of Cups",k:"컵 4",y:"other"},
  {i:40,n:"Five of Cups",k:"컵 5",y:"no"},{i:41,n:"Six of Cups",k:"컵 6",y:"yes"},
  {i:42,n:"Seven of Cups",k:"컵 7",y:"other"},{i:43,n:"Eight of Cups",k:"컵 8",y:"other"},
  {i:44,n:"Nine of Cups",k:"컵 9",y:"yes"},{i:45,n:"Ten of Cups",k:"컵 10",y:"yes"},
  {i:46,n:"Page of Cups",k:"컵 시종",y:"yes"},{i:47,n:"Knight of Cups",k:"컵 기사",y:"yes"},
  {i:48,n:"Queen of Cups",k:"컵 여왕",y:"yes"},{i:49,n:"King of Cups",k:"컵 왕",y:"yes"},
  {i:50,n:"Ace of Swords",k:"소드 에이스",y:"yes"},{i:51,n:"Two of Swords",k:"소드 2",y:"other"},
  {i:52,n:"Three of Swords",k:"소드 3",y:"no"},{i:53,n:"Four of Swords",k:"소드 4",y:"other"},
  {i:54,n:"Five of Swords",k:"소드 5",y:"no"},{i:55,n:"Six of Swords",k:"소드 6",y:"other"},
  {i:56,n:"Seven of Swords",k:"소드 7",y:"no"},{i:57,n:"Eight of Swords",k:"소드 8",y:"no"},
  {i:58,n:"Nine of Swords",k:"소드 9",y:"no"},{i:59,n:"Ten of Swords",k:"소드 10",y:"no"},
  {i:60,n:"Page of Swords",k:"소드 시종",y:"other"},{i:61,n:"Knight of Swords",k:"소드 기사",y:"yes"},
  {i:62,n:"Queen of Swords",k:"소드 여왕",y:"other"},{i:63,n:"King of Swords",k:"소드 왕",y:"other"},
  {i:64,n:"Ace of Pentacles",k:"펜타클 에이스",y:"yes"},{i:65,n:"Two of Pentacles",k:"펜타클 2",y:"other"},
  {i:66,n:"Three of Pentacles",k:"펜타클 3",y:"yes"},{i:67,n:"Four of Pentacles",k:"펜타클 4",y:"other"},
  {i:68,n:"Five of Pentacles",k:"펜타클 5",y:"no"},{i:69,n:"Six of Pentacles",k:"펜타클 6",y:"yes"},
  {i:70,n:"Seven of Pentacles",k:"펜타클 7",y:"other"},{i:71,n:"Eight of Pentacles",k:"펜타클 8",y:"yes"},
  {i:72,n:"Nine of Pentacles",k:"펜타클 9",y:"yes"},{i:73,n:"Ten of Pentacles",k:"펜타클 10",y:"yes"},
  {i:74,n:"Page of Pentacles",k:"펜타클 시종",y:"yes"},{i:75,n:"Knight of Pentacles",k:"펜타클 기사",y:"yes"},
  {i:76,n:"Queen of Pentacles",k:"펜타클 여왕",y:"yes"},{i:77,n:"King of Pentacles",k:"펜타클 왕",y:"yes"},
];
const SYMS=["🌟","⚡","🌙","☀️","🔮","⚔️","🌹","🦋","🌊","🔥","🌿","💫","🎭","🌺","⚖️","🦅","🌛","💎","🏔️","🌈"];
const LABELS=["첫 번째","두 번째","세 번째"];
const YNC={yes:"#4ade80",no:"#f87171",other:"#fbbf24"};
const YNL={yes:"✅ YES",no:"❌ NO",other:"⚖️ 그 외"};
const sym=c=>SYMS[c.i%SYMS.length];

// Stars
const sf=document.getElementById('stars');
for(let i=0;i<50;i++){
  const s=document.createElement('div');
  s.className='star';
  s.style.cssText=`top:${(Math.sin(i*137.5)*.5+.5)*100}%;left:${(i*61.8)%100}%;animation:tw ${2+i%4}s ease-in-out infinite;animation-delay:${(i*.27)%3}s`;
  sf.appendChild(s);
}

const card=document.getElementById('card');
const cardInner=document.getElementById('card-inner');
const idleMark=document.getElementById('idle-mark');
const status=document.getElementById('status');
const btnStart=document.getElementById('btn-start');
const btnStop=document.getElementById('btn-stop');
const btnConfirm=document.getElementById('btn-confirm');
const flippingMsg=document.getElementById('flipping-msg');
const drawnArea=document.getElementById('drawn-area');
const drawnCards=document.getElementById('drawn-cards');
const doneBox=document.getElementById('done-box');
const doneList=document.getElementById('done-list');
const btnReset=document.getElementById('btn-reset');
const subtitle=document.getElementById('subtitle');

let timer=null, used=[], drawn=[], pending=null;

function pick(){
  let i; do{i=Math.floor(Math.random()*78);}while(used.includes(i));
  return deck[i];
}

function showCard(c,revealed){
  if(revealed){
    card.style.background='linear-gradient(160deg,#fef9ee,#fde68a,#f0a830)';
    card.style.borderColor='#f59e0b';
    card.style.animation='fi .5s ease-out forwards';
    idleMark.classList.add('hidden');
    card.querySelector('.pattern').classList.add('hidden');
    const yn=c.y;
    cardInner.innerHTML=`<div class="csym">${sym(c)}</div><div class="cko">${c.k}</div><div class="cen">${c.n}</div><div class="cyn" style="color:${YNC[yn]};background:${YNC[yn]}22">${YNL[yn]}</div>`;
    cardInner.classList.remove('hidden');
    status.textContent=`인덱스 #${c.i}`;
    status.classList.remove('hidden');
  } else {
    card.style.background='linear-gradient(160deg,#1b0840,#2d1b4e)';
    card.style.borderColor='#a855f7';
    card.style.animation='sh .15s ease-in-out infinite,gp 1.2s ease-in-out infinite';
    card.querySelector('.pattern').classList.remove('hidden');
    idleMark.classList.add('hidden');
    cardInner.classList.add('hidden');
    cardInner.innerHTML='';
    const sc=deck[Math.floor(Math.random()*78)];
    status.textContent=`#${sc.i} 셔플 중...`;
    status.classList.remove('hidden');
  }
}

function resetCard(){
  card.style.background='linear-gradient(160deg,#1b0840,#2d1b4e)';
  card.style.borderColor='#4c1d95';
  card.style.animation='fl 3s ease-in-out infinite';
  card.querySelector('.pattern').classList.remove('hidden');
  idleMark.classList.remove('hidden');
  cardInner.classList.add('hidden');
  cardInner.innerHTML='';
  status.classList.add('hidden');
}

function addDrawnCard(c,idx){
  const d=document.createElement('div');
  d.className='drawn-card';
  d.innerHTML=`<div class="dc-label">${LABELS[idx]}</div><div class="dc-sym">${sym(c)}</div><div class="dc-ko">${c.k}</div><div class="dc-info">#${c.i} · ${c.n}</div><div class="dc-yn" style="color:${YNC[c.y]};background:${YNC[c.y]}22">${YNL[c.y]}</div>`;
  drawnCards.appendChild(d);
  drawnArea.classList.remove('hidden');
}

btnStart.addEventListener('click',()=>{
  btnStart.classList.add('hidden');
  btnStop.classList.remove('hidden');
  timer=setInterval(()=>showCard(null,false),80);
});

btnStop.addEventListener('click',()=>{
  clearInterval(timer);
  btnStop.classList.add('hidden');
  flippingMsg.classList.remove('hidden');
  pending=pick();
  used.push(pending.i);
  card.style.animation='fi .5s ease-out forwards';
  setTimeout(()=>{
    flippingMsg.classList.add('hidden');
    showCard(pending,true);
    btnConfirm.classList.remove('hidden');
  },500);
});

btnConfirm.addEventListener('click',()=>{
  addDrawnCard(pending,drawn.length);
  drawn.push(pending);
  btnConfirm.classList.add('hidden');
  pending=null;
  if(drawn.length>=3){
    subtitle.textContent='✦ 3장 완료 · 결과를 친구에게 공유하세요 ✦';
    document.getElementById('card-area').classList.add('hidden');
    doneList.innerHTML=drawn.map((c,i)=>`<span style="color:#c084fc">${c.k}</span>${i<2?'<span style="color:#5b21b6"> → </span>':''}`).join('');
    doneBox.classList.remove('hidden');
  } else {
    subtitle.textContent=`✦ ${LABELS[drawn.length]} 카드 ✦`;
    resetCard();
    btnStart.classList.remove('hidden');
  }
});

btnReset.addEventListener('click',()=>{
  drawn=[];used=[];pending=null;
  drawnCards.innerHTML='';
  drawnArea.classList.add('hidden');
  doneBox.classList.add('hidden');
  document.getElementById('card-area').classList.remove('hidden');
  subtitle.textContent='✦ 첫 번째 카드 ✦';
  resetCard();
  btnStart.classList.remove('hidden');
  btnStop.classList.add('hidden');
  btnConfirm.classList.add('hidden');
  flippingMsg.classList.add('hidden');
});
</script>
</body>
</html>
